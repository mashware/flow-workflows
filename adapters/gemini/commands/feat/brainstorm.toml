description = "Generate options, angles, and risks for the feature before designing"

prompt = """
# `/feat:brainstorm`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

Exploration phase. **Does not write code.** Only opens the solution space so the design does not start from the first idea.

## 1. Pre-flight

- Locate the active `meta.json`: first look by the current branch (`git branch --show-current`), otherwise ask for the ticket.
- If `meta.json.phase` is not `context`, warn and ask whether to continue anyway.
- If `size` is `XS` or `S`, suggest skipping directly to `/feat:design` or `/feat:build` and stop (unless the user insists).
- Read `01-context.md`.

## 2. Focused domain-memory query

If `domain_memory.enabled` is `true` in `FLOW.md`: before generating options, call `mcp__domain-memory__search_knowledge` with queries focused on the **concept/pattern** the feature covers, not the generic title (that was already queried in `/feat:start`). Examples by area:

- If the feature touches tracking → `"tracking deduplication"`, `"hash collision"`.
- If it touches payments → `"trial expiration"`, `"plan downgrade flow"`.
- If it touches external integrations → `"attachment handler"`, `"tax rules integration"`.

Launch 2-3 queries in parallel (or sequentially if parallelism is not possible). Timeout 2 s; if it fails, continue without context and do not notify the user. Note relevant hits in `02-brainstorm.md` under "Additional domain knowledge" (do not repeat what is already in `01-context.md`). If `domain_memory.enabled` is `false` or empty, skip without notifying.

## 3. Work

### 3.0 Multi-agent panel or single agent?

- If `meta.json.size` is **M or L**: ask the user directly in text: "Generate the options with a parallel multi-agent panel? More costly in tokens, less bias from a single line of thought." If they accept → §3.A. If they decline → §3.B.
- If **S** (or the user declined): §3.B directly. Panel not offered for XS/S — the cost does not justify it.

### 3.A Approach panel (parallel subagents)

If the environment has subagents defined in `.gemini/agents/`, launch one per lens in parallel (without seeing each other → real diversity) and a final agent that synthesizes and ranks them. The lenses are:

- `minimal`: the SMALLEST approach that solves the declared use case, nothing more (strict MVP).
- `reuse`: the approach that MOST reuses existing pieces in the affected module or neighbors.
- `operations`: the most production-solid approach (observability, external integration failure, data at scale).
- `rethink`: challenges the premise: what if the problem is solved without building what is requested, or elsewhere?

Each agent receives: the ticket title, path to `01-context.md`, and the instruction to propose ONE approach from its specific lens — real modules/layers of the project, main risk, and why it could be a bad idea. It does not write code.

Then run a **peer-review round** (the LLM-council step that keeps synthesis from ranking on presentation instead of substance): relaunch the lens agents in parallel, each now **seeing all the approaches**, and have each critique the OTHERS from its lens — for every approach the single biggest flaw for THIS project (or "none"), plus which is strongest and which weakest. Grounded in the project; no invented flaws.

The synthesizer agent receives the approaches **and the peer-reviews**, ranks them from best to worst for THIS case (fit in the project + simplicity) weighing the surfaced fatal flaws, states where the lenses agreed and where they disagreed, and gives an initial recommendation with 2-3 lines of justification.

If a subagent fails, simply do not include its approach in the result.

### 3.B Single agent (default)

Work directly (or delegate to a generic agent) with this assignment:

> Generate 3-5 different approaches for solving `<title>` following the project conventions (see `FLOW.md` and `.claude/work/<TICKET>/01-context.md`). For each approach: one sentence on what it is, affected modules/layers, main risk, and why it could be a bad idea. Do not write code. Report in markdown under 400 words.

If the feature touches a sensitive domain (payments, authentication, tracking), also launch **in parallel** (or sequentially) a second angle focused on "what can go wrong" for that domain.

## 4. Output

Create `.claude/work/<TICKET>/02-brainstorm.md`:

```markdown
# Brainstorm <TICKET>

## Additional domain knowledge
<hits from the focused search_knowledge, or "no findings">

## Options considered
### Option A: <name>
- What it is:
- Affected modules/layers:
- Main risk:
- Why it could be a bad idea:

### Option B: …
### Option C: …

## Cross-cutting risks
<bullets>

## Initial recommendation
<one option, with 2-3 lines of justification. If the panel ran (§3.A), prefix with a one-line
"Panel consensus / disagreement:" summarizing where the advisors' peer-review agreed and where it split.>
```

## 5. Emerging questions

Looking at options often reveals new questions that `/feat:start` did not surface (e.g. "does this only apply to paid plans?", "what happens if the user already has N of these?"). If any appeared, **ask the user before closing** directly in text. Note the answers at the end of `02-brainstorm.md` under "Decisions clarified in /feat:brainstorm".

## 6. Is the size still correct?

After reviewing the options, evaluate whether `meta.json.size` still matches the actual scope:

- If the brainstorm suggests the feature is much simpler/more complex than assumed, **propose reclassifying to the user** (direct text question) with the new estimate and one line of justification.
- If confirmed, update `meta.json.size` and note the change in `meta.json.notes` (`"size: M→S after brainstorm — chosen option does not require migration"`).
- If they keep the size, continue.

## 7. Close

- Update `meta.json`: `phase = "brainstorm"`, add to `phases_done`, update `updated_at`.
- Show the user the options and ask them to choose (or request adjustments) **before** moving to `/feat:design`. If they pick one, note it in `meta.json.notes`.
"""
