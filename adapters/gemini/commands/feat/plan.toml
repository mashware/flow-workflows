description = "Split the work into small, independently mergeable MRs/PRs before implementing"

prompt = """
# `/feat:plan`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context â€” do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

Delivery planning phase. **No code is written.** Decide how to split the feature into MRs/PRs that can live on their own on the main branch even if the later ones never arrive.

## 1. Pre-flight

- Load `meta.json` from the current branch. If it does not exist, send the user to `/feat:start`.
- Require `design` in `phases_done`. If not, send to `/feat:design` and stop.
- Read `01-context.md`, `02-brainstorm.md` (if it exists), and `03-design.md`.
- **If `size` is `XS` or `S`**: warn that this phase does not apply (always 1 MR/PR), mark `plan` as skipped in `phases_done` with value `"plan:skipped"`, and suggest `/feat:build`. Stop.

## 2. Work

Load the project convention skills (see `FLOW.md` section `conventions`).

**Before splitting, apply a YAGNI filter to the design**: the plan only divides work that `03-design.md` has already validated as necessary. If while splitting you see an MR/PR (or part of one) dedicated to a **future hypothetical problem** or defending against a scenario that **cannot occur in this project**, do not turn it into a deliverable: mark it as "out of scope â€” idea for a separate ticket" and notify the user. Do not split or plan what will not be built today. If this reveals that the design let excess pieces through, go back to `/feat:design` to trim them before planning.

Work with an agent (or yourself) with this assignment (self-contained):

> Read `.claude/work/<TICKET>/03-design.md`. Propose how to split the implementation into **independently mergeable** MRs/PRs: each one must be able to live on its own on the main branch without breaking anything even if the later ones never arrive. Think about feature flags, temporary dead code, schema backward compatibility, online migrations in multiple steps, stable event contracts. **Do not create MRs/PRs dedicated to future hypothetical problems or defenses against scenarios the project already prevents â€” split only what is needed for what the ticket asks today (YAGNI).** Table with: order, what it includes, standalone-mergeable (yes/no + how it is guaranteed), what it unblocks in the next one, risk if it stays alone on the main branch indefinitely, **`lines_est`** (approximate lines, sum of added + modified) and **`files_est`** (approximate files touched). Estimates are **soft** â€” they serve as a gauge during build, not a contract. If the right answer is "1 single MR/PR", justify it and return that. Under 500 words.

If the feature touches payments, authentication, or sensitive data, also launch **in parallel** (or sequentially) the `agents.security` agent from `FLOW.md` (or generic agent if empty) with the assignment: "For each MR/PR proposed in the delivery plan, identify whether it opens a security exposure window while the later ones are not yet merged (e.g. new endpoint without the final check, column without the final constraint). Actionable items only."

## 3. Output

Consolidate in `.claude/work/<TICKET>/04-mr-plan.md`:

```markdown
# Delivery plan <TICKET>

## Summary
- Number of MRs/PRs: N
- Split justification (1-2 lines):
- Recommended order: #1 â†’ #2 â†’ â€¦

## MRs/PRs

### #1: <short title>
- **Includes**: bullets of what changes.
- **Standalone-mergeable**: yes / no â€” how it is guaranteed (flag, nullable column, dead code, etc.).
- **Unblocks**: what the next one can then do.
- **Risk if left alone on the main branch indefinitely**: â€¦
- **Estimated size**: XS / S / M.
- **`lines_est`**: ~N lines (added + modified).
- **`files_est`**: ~N files.

### #2: â€¦

## Dependencies between MRs/PRs
<simple graph in bullets: #2 depends on migration from #1, etc.>

## Plan risks
- Online migrations:
- Compatibility with deployed clients:
- New domain events:
- Feature flags introduced (and when they are removed):

## Decision: one or multiple MRs/PRs?
<if 1: justification. If multiple: why this split and not another>
```

If the plan proposes 1 single MR/PR, keep the artifact the same with that single entry and the justification. Do not force artificial splitting.

## 4. Registration in `meta.json`

Add the `mrs` array to `meta.json` with the agreed plan:

```json
"mrs": [
  { "n": 1, "title": "â€¦", "size": "S", "status": "pending", "lines_est": 120, "files_est": 6 },
  { "n": 2, "title": "â€¦", "size": "M", "status": "pending", "lines_est": 350, "files_est": 14 }
]
```

Estimates are **indicative**, not contractual. `/feat:build` uses them as a gauge: if actual work exceeds +50% of `lines_est` or `files_est + 2`, it triggers the "cut or continue" question (see build Â§C).

Valid states:

| State | Meaning |
|-------|---------|
| `pending` | Not yet started. |
| `in_progress` | Build/review/validate of this MR/PR is under way. |
| `merged` | MR/PR merged to the main branch. |
| `closed` | MR/PR closed without merge (rejected, discarded). Requires `note` with reason. |
| `superseded` | Replaced by a later MR/PR (plan was rethought). Requires `note` pointing to the replacement. |

`/feat:build` moves `pending` â†’ `in_progress`. `/feat:ship` moves `in_progress` â†’ `merged` when it confirms the merge, or to `closed` if discarded. If after a build the split needs to be rethought, go back to `/feat:plan`, mark the old entry as `superseded`, and add the new ones.

## 5. Is the size still correct?

If while splitting you see that it actually produces 1 small MR/PR (â‰¤ 50 lines, no migrations), reclassify to `S` and notify. If conversely it produces 5+ large MRs/PRs, consider raising to `L`. Confirm with the user (direct text question) before changing `meta.json.size`.

## 6. Close

- Update `meta.json`: `phase = "plan"`, add `plan` to `phases_done`.
- Show the user the summary table and ask for approval.
- If they request changes, edit the artifact and `meta.json.mrs` before proceeding.
- Suggest `/feat:build` to start the first MR/PR.
"""
