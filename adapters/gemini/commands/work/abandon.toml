description = "Close a work without shipping (discarded feature, non-issue, etc.)"

prompt = """
# `/work:abandon`

**Step 0**: read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

Clean closure for works that will not reach the base branch. Typical cases:

- A feature is discarded after `brainstorm` or `design` (no value, scope does not justify effort).
- A bug turns out not to be one (expected behavior, external problem, user configuration).
- A work is replaced by another ticket that absorbs it.

## 1. Pre-flight

- Locate the active `meta.json`: search by current branch; if not found, ask the user for the ticket.
- If `phase` is already `done`, do not abandon: warn and stop (completed works are archived, not abandoned).
- Read `meta.json` and existing artifacts to understand what was done.

## 2. Justification

Ask the user for the reason directly in text. Typical options:

- **Feature discarded** (not enough value).
- **Not a bug** (expected behavior or external problem).
- **Absorbed by another ticket** (done in another ticket).
- **Externally blocked** (depends on something outside our control).
- **Other** (user explains).

Record the justification in a single line — it goes in the artifact.

## 3. Minimal capture

Write `.claude/work/<TICKET>/99-abandoned.md`:

```markdown
# Abandoned <TICKET>

## Reason
<one line>

## State at abandonment
- Phase reached: <phase>
- Phases completed: <phases_done>
- Branch: <branch>
- Commits in branch: <git log --oneline <base>..HEAD | wc -l>
- Unmerged code?: yes / no

## What was learned (if applicable)
<short bullets on analysis conclusions, if any>

## Derived actions (if applicable)
- New ticket to open:
- Changes to revert:
- Branch to delete: yes / no
```

`<base>` is read from `git.default_base` in FLOW.md; if empty, use `origin/main` or `origin/master` according to the repo's actual base branch.

## 4. Domain knowledge (conditional offer)

**Only if `domain_memory.enabled` is `true` in FLOW.md and the analysis left non-obvious findings** (why something in the domain works the way it does, legal constraints, integrations with surprising behavior): ask the user whether they want to invoke the `/save-knowledge` flow. Silence by default — abandoning does not mean nothing was learned, but most of the time there is nothing worth saving. If `domain_memory.enabled` is `false` or absent, skip this step without notifying.

## 5. Git state

Ask the user what to do with the branch:

- **Delete locally** (if there is nothing to keep): `git checkout <base> && git branch -D <branch>`. **Only if the user confirms** — destructive.
- **Leave it** (in case the topic comes back): do not touch it.
- **Push to remote as reference** (rare but valid if there is valuable analysis).

Do not decide on your own — ask.

## 6. Close

- Update `meta.json`:
  - `phase = "abandoned"`.
  - `phases_done` is not changed (reflects what was actually done).
  - `notes` += abandonment reason.
  - `updated_at` updated.
- Move the folder to `.claude/work/_archive/<TICKET>/` so it does not appear in `/work:status` as pending.
- Summarize to the user: ticket abandoned, reason, what was done with the branch.

## Recovery

If the topic comes back, the user can:
1. Move the folder back: `mv .claude/work/_archive/<TICKET> .claude/work/<TICKET>`.
2. Change `phase` to the phase to resume from.
3. Re-create the branch if it was deleted.

There is no dedicated command for this — it is intentionally manual (should not be a frequent case).
"""
