description = "Regression test and verification that the bug does not recur"

prompt = """
# `/bug:validate`

Validate that the fix works and the bug does not come back.

## 1. Pre-flight

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user.

- Load `meta.json`. Require `fix` in `phases_done`.
- If `size` is `XS`, suggest skipping to `/bug:review` unless the user insists.

## 2. Work

**Mandatory regression test**: launch the `agents.testing` agent from FLOW.md (if empty, a generic agent with a test-writing role) with the assignment:

> Write a test that fails **before** the fix and passes **after**. Read `.claude/work/<TICKET>/02-diagnose.md` (minimal reproduction), `04-fix.md` (what was changed). Follow the conventions in `FLOW.md` (section `conventions`). Report the path of the added test.

Then:
1. Run only that test with `quality.test_one` from FLOW.md; it must pass.
2. Run the full suite with `quality.test` to rule out collateral regressions (in the background if it takes time).
3. If you touched the DB: check that the schema has no unexpected differences (use `quality.db_update` or the equivalent from FLOW.md if defined).
4. If you touched security or authentication: launch in parallel (or sequentially) the `agents.security` agent from FLOW.md on the fix files; if empty, use a generic agent with a security role in the prompt.

## 3. Adjacent areas

From `03-investigation.md` there may be "areas with similar risk". Do not fix them here, but verify that **they at least do not exhibit the same active symptom** (quick search for the broken pattern).

## 4. Output

`.claude/work/<TICKET>/05-validation.md`:

```markdown
# Validation {TICKET}

## Regression test
- Path: `tests/...`
- Fails before the fix: ✅
- Passes after the fix: ✅

## Full suite
- `<quality.test>`: ✅ / ❌ (X failures)
- `<quality.static_analysis>`: ✅ / ❌

## Adjacent areas
- Searches done:
- Other issues detected: <list to open separate tickets, do NOT fix here>
```

## 5. Close

- If test is red or there are regressions: `phase` stays at `fix`. The user iterates.
- If green: `phase = "validate"`, add to `phases_done`. Suggest `/bug:review`.
"""
