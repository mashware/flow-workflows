description = "Assistant that generates this repo's FLOW.md (auto-detects what it can, asks the minimum)"
prompt = """
Create (or update) `FLOW.md` at the repo root. This is the configuration read by all other commands. Goal: the user answers as LITTLE as possible — everything deducible from the repo is auto-detected and only confirmed. The structure and key names of `FLOW.md` are in the adapter README.

## 1. If `FLOW.md` already exists
Show it and ask the user (in plain text): update or cancel. Do not overwrite without confirmation.

## 2. Auto-detection (do NOT ask about things you can deduce)
Run and infer; show what was found for confirmation/correction:
- Git host and CLI — from `git remote -v`: github.com→github/gh/PR; gitlab.*→gitlab/glab/MR; bitbucket.org→bitbucket/PR; dev.azure.com→azure/az/PR; Gitea/Forgejo→gitea/tea; unknown domain (self-hosted)→ask which one and which CLI. Check installed CLI: `command -v gh glab tea az`.
- Base branch — `git symbolic-ref refs/remotes/origin/HEAD` → origin/main or origin/master (git.default_base).
- Quality commands — inspect the repo and propose what is available (empty if absent): Makefile (targets test/lint/stan/fmt/migrate), package.json scripts, composer.json (phpunit/phpstan/cs-fixer), pyproject/pytest/ruff/mypy, Cargo, go. If there are schema migrations, propose quality.db_diff and raise git.predeploy_gate.
- domain-memory — is the domain-memory MCP in settings.json? If yes, domain_memory.enabled: true.

## 3. Ask only what cannot be deduced (in plain text, listing options; always leave "empty → auto-discover")
- Ticket prefix (tracker.prefix) and how to read it (tracker.tool: acli=Jira / gh=GitHub issues / glab=GitLab issues / linear / none), offered without preselecting (the git host does not determine the tracker). From the choice, set a default tracker.view_cmd the user can override: acli -> "acli jira workitem view {TICKET}"; gh -> "gh issue view {TICKET}"; glab -> "glab issue view {TICKET}"; linear/none -> empty.
- Assignee (git.assignee) and squash (git.squash).
- MR/PR sections (git.request_sections, or free-form).
- Pre-deploy gate (git.predeploy_gate): do you run SQL manually before deploying? If yes, propose quality.db_diff.
- Agents by role (agents.*, review.*): optional; empty uses the general sub-agent. If the repo has its own agents (.gemini/agents/*.md), collect their names.
- Observability: empty by default = auto-discover in /work:watch.

## 4. Write `FLOW.md`
Generate the file at the repo root with all contract sections (tracker, git, quality, agents, review, conventions, domain_memory, observability), filling in detected/answered values and leaving empty what the user did not set.

## 5. Close
Summarize what was configured and what was left empty (= auto-discover). FLOW.md can be committed. Suggest /feat:start or /work:status.
"""
