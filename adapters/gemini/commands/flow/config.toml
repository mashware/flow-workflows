description = "Show this repo's effective FLOW.md config — what is set, what is empty (and its fallback), and validate it"

prompt = """
# `/flow:config`

Read-only. Shows what the `/feat:*`, `/bug:*`, `/work:*` and `/flow:*` commands will actually use in this repo, so you do not have to open `FLOW.md` and cross-check it against the template by hand. **Writes nothing** — to change the config use `/flow:init` or edit `FLOW.md`.

Canonical key list and their meaning: `examples/FLOW.template.md` from the plugin. Report against that contract — do not invent keys, and do report keys that are documented there but absent from the repo's `FLOW.md` (those are the "empty → fallback" rows).

## 1. Load

- Read `FLOW.md` at the repo root. If it does not exist, say so, explain that every command still works by auto-detecting/asking, and suggest `/flow:init` to generate one. Then, so the output is still useful, run §2 treating **every** key as empty (all fallbacks).
- Parse it by section: `tracker`, `git`, `quality`, `agents`, `conventions`, `notes`, `domain_memory`, `observability`.

## 2. Effective config (per section)

For **every** documented key in `examples/FLOW.template.md`, print one row:

- **set** → show the value (for a list key like `git.worktree_resync` or `quality.reviewers`, show the items).
- **empty / absent** → show `(empty → <what happens>)`, taking the "what happens" from that key's comment in the template (e.g. `quality.test` empty → "auto-discover from Makefile/npm/composer"; `tracker.tool` empty → "manual paste"; `agents.security` empty → "the conductor performs the task in the same context"; `git.worktree` empty → "off / in-place"; `git.worktree_resync` empty → "`/work:try` only switches, no re-sync"). Never leave a reader guessing what an empty key does.

Group the output by section with a short header each, so it reads as a table/scan, not prose. Keep set-vs-empty visually distinguishable (e.g. `✓` vs `·`).

## 3. Validate (flag, do not fix)

Light checks — report problems, never change anything:

- **CLIs**: for the tools referenced (`tracker.tool`, `git.cli`), check they are installed (`command -v gh glab acli tea az …`). Missing → warn that the corresponding step degrades (e.g. tracker read → manual paste; MR/PR creation → manual).
- **Agents**: for each non-empty `agents.*` and `quality.reviewers` / `quality.review_skill`, check it is discoverable (`.gemini/agents/`, or the conductor's configured agents). Not found → warn it will fall back to running in the same context (or be skipped).
- **Commands**: for `quality.*` and `git.worktree_resync` entries that look like `make <target>`, optionally check the target exists in the `Makefile`; for npm/composer scripts, check they exist. Do not run them — only check presence. Unresolvable → flag as "declared but not found".
- **Coherence**: `git.worktree` is `ask`/`always` but `git.worktree_path` empty → note the default `.worktrees/{branch}` will be used. `git.host` and `git.cli` disagree → flag. `domain_memory.enabled` is `true` but the MCP is not available this session → note the domain steps will be skipped.

## 4. Close

- Print a one-line summary: `N keys set, M using fallbacks, K warnings`.
- If there are warnings, suggest the concrete fix (install a CLI, create/rename an agent, correct a key) and, when the fix is a config change, point at `/flow:init` or the specific `FLOW.md` key.
- Do not proceed to any other command on your own.
"""
