description = "Summary of all open works in .claude/work/"

prompt = """
# `/flow:work:status`

**Step 0**: read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context ÔÇö do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

Shows an overview of works in progress and detects divergences between artifacts and the actual git state.

## 1. List works

- `ls -1 .claude/work/` (ignore `_archive`).
- For each folder matching the ticket pattern, read its `meta.json`.

## 2. For each work, show

```
<TICKET> [feat|bug] [XS|S|M|L]  ÔĆÁ <current phase>
  Branch:      <branch>           [Ôťô active | ÔÜá not current]
  Started:     <date>
  Updated:     <date>
  Phases done: context, design, buildÔÇŽ
  MR/PRs:      2/4 merged ┬Ě MR/PR #3 in_progress ┬Ě MR/PR #4 pending
  Cross-repo:  <meta.related_repos entries not "done", as "repo: scope">   (line only if any)
  Pending:     <suggested next command>
```

The term "MR" or "PR" is read from `git.request_term` in FLOW.md; if empty, use "MR/PR".

The `Cross-repo:` line is only printed if `meta.json.related_repos` has entries not `done`; show each as `<repo>: <scope>`. It flags that a **sibling repo still has a pending part** of this task. flow only surfaces what's recorded ÔÇö it never scans or touches the other repo.

The `MR/PRs:` line is only printed if `meta.json.mrs` exists and has >0 entries. Format:
- Summary: `<merged>/<total> merged`.
- If there are `closed` or `superseded` MRs/PRs, add to the count: `2/4 merged ┬Ě 1 closed ┬Ě 1 pending`.
- If there is one `in_progress`, show it explicitly with its number.
- If there is any `closed` or `superseded`, also list the reason (truncated to 40 chars): `MR/PR #2 closed (reviewer asked for different approach)`.

### Actual progress vs estimate

**Only for the `in_progress` MR/PR and only if the branch matches the current one** (the diff can be measured). The diff base is read from `git.default_base` in FLOW.md; if empty, auto-discover the repo's base branch. Calculate:

```bash
git diff --shortstat <base>..HEAD          # lines
git diff --name-only <base>..HEAD | wc -l  # files
```

Compare with `mrs[in_progress].lines_est` and `files_est` and show a line below `MR/PRs:`:

```
  Actual MR/PR size: 180/120 lines (150%) ┬Ě 7/6 files     ÔÜá exceeds estimate
```

Rules:
- If lines ÔëĄ `lines_est * 1.5` **and** files ÔëĄ `files_est + 2`: show without warning, in grey.
- If **either** threshold is exceeded: add `ÔÜá exceeds estimate` and suggest that `/flow:feat:build` applies ┬ž2.2 (cut / continue / reopen).
- If `lines_est` does not exist in meta.json (work created before this improvement): do not show the line, do not invent an estimate.

## 3. Divergences with git

If the branch in meta.json **is the current one**:

- `git diff --name-only <base>...HEAD | wc -l` Ôćĺ files changed in the branch.
- Read `04-implementation.md` or `04-fix.md` and extract the listed files.
- If there are files changed in git not recorded in the log, show:
  ```
  ÔÜá Divergence: <N> files changed not recorded in log.
     Examples: <path>, <path>ÔÇŽ
  ```
- If there are files in the log with no actual changes in git, the same.

## 4. Orphaned works

- If there are local branches matching the ticket pattern without a `.claude/work/<TICKET>` folder: report it.
- If there are `.claude/work/<TICKET>` folders whose branch no longer exists locally: ask whether to archive.

The branch pattern is inferred from `git.branch_pattern` in FLOW.md; if empty, look for branches matching the pattern `<prefix>XXXXX-*` or orphaned `.claude/work/` folders.

## 5. Quick actions

At the end, if there is a work whose branch matches the current one, suggest:
- If `phase = "done"`: nothing to do, offer to archive.
- If `phase = "abandoned"`: the folder should already be in `_archive/`; if it is at root, suggest moving it.
- If there is an `in_progress` MR/PR waiting for merge confirmation: indicate that `/flow:feat:ship` should update the state.
- If there is a `closed` MR/PR without a subsequent decision: warn the user to decide (retry build or abandon).
- Otherwise: the concrete next command.
"""
