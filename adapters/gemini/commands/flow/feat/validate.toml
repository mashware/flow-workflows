description = "Validate tests, edge cases, and integrity before shipping"

prompt = """
# `/flow:feat:validate`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context â€” do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

**Autonomy.** Read `autonomy.mode` from `FLOW.md` (`manual` | `guided` | `auto`; empty = `manual`) and apply it throughout this command. `manual` â€” stop at every decision point; at the end, propose the next command by asking the user to confirm it (write the question with the recommended next step as the default numbered option) and invoke it only when the user confirms â€” never advance without that confirmation, never make the user type it. `guided` â€” resolve low-risk, unambiguous decisions yourself using the recommended default and record the choice in the phase artifact instead of asking; still ask at genuine decision points; at the end, chain into the recommended next command automatically. `auto` â€” as `guided`, and also auto-resolve the remaining decision points with sensible (recorded) defaults, chaining phases without pausing. **Hard gates â€” ALWAYS stop and ask the user, in every mode, no exceptions:** (1) any push or MR/PR creation (all of `ship`); (2) creating or switching a branch when the base is ambiguous (not on a clean main, or a possible train/stacked branch); (3) DB schema changes or migrations; (4) a `review` that surfaced high-severity findings â€” never chain into `ship` on those. Rule of thumb for everything else: ask only when a decision is (a) irreversible or costly to undo, (b) ambiguous and not resolved by the ticket + domain-memory, or (c) a hard gate; otherwise take the sensible default and record it in the artifact.

Verify that the feature is complete: test coverage, edge cases, performance, regressions.

## 1. Pre-flight

- Load `meta.json`. Require `review` in `phases_done`. **In a multi-MR/PR work** (`meta.json.mrs` has >1 entry) require `review` in the **current `in_progress` MR/PR's** own `phases_done` (its `mrs[]` entry), not the work-level list â€” a previous MR/PR's `review` does not count. If not, send to `/flow:feat:review`.
- If `size` is `XS`, this phase can be skipped (warn and continue with `/flow:feat:ship`).

## 2. Work

Launch **in parallel** (or sequentially if not possible):

1. **Testing agent**: use the `agents.testing` agent from `FLOW.md`; if empty, use a generic agent with this role. Assignment: "Review the branch changes and complete the test suite where coverage is missing. Focus: edge cases from `03-design.md`, error paths, input validations, domain events emitted. Do not rewrite tests that already pass. Read `.claude/work/<TICKET>/03-design.md` and `05-implementation.md`. Follow the project's test conventions (see `FLOW.md` section `conventions`)."

2. **Performance agent** if the feature touches persistence, repositories, templates on hot paths, or controllers with real traffic: use the `agents.performance` agent from `FLOW.md`; if empty, use a generic agent with this role. Assignment: "Detect N+1, missing indexes, unbounded queries, flush in loop, heavy synchronous work that should go to a queue. Report only actionable items."

3. **Full suite**: run `quality.test` from `FLOW.md` in the background; if empty, auto-discover the project's test command and report what you use. If there are frontend changes and `quality.frontend_test` is defined, run it too.

## 3. Manual edge cases

If `meta.json.worktree` is not null (the work was developed in a worktree and the runnable env lives in the main checkout), offer once before verifying: "to test this branch against the main environment, run `/flow:work:try <meta.branch>` (it switches the main checkout and re-syncs per `git.worktree_resync`), and `/flow:work:try --back` to return afterwards." Suggest it, do not run it yourself and do not force it.

If the feature has UI or critical flows:
- If it touches payments: test with the appropriate test cards or credentials for the provider (see `/stripe:test-cards` if using Stripe).
- If it touches workers/queues: make sure no jobs are left in the dead-letter queue. If there are and they are not yours, do not touch them here.
- If it touches migrations: run `quality.db_update` from `FLOW.md` (if defined). Verify there is no unexpected schema difference using the project's comparison command.

## 4. Output

Write `.claude/work/<TICKET>/07-validation.md`:

```markdown
# Validation <TICKET>

## Test coverage
- Unit added: N (list)
- Integration added: M
- Functional added: K

## Suite results
- `<quality.test>`: âś… / âťŚ (N tests, X failures)
- `<quality.frontend_test>`: âś… / âťŚ / N-A
- `<quality.static_analysis>`: âś… / âťŚ

## Performance
- Analysis findings: â€¦
- Open risks: â€¦

## Edge cases verified
- [x] â€¦
- [ ] â€¦

## Regressions
- Areas checked: â€¦
- No regressions detected / regressions detected: â€¦
```

## 5. Close

- If tests are red or regressions remain, **do not advance `phase`**. The user resolves them and returns to `/flow:feat:validate`.
- If everything is green: `phase = "validate"`, add to `phases_done`. **In a multi-MR/PR work**, also add `validate` to the current `in_progress` MR/PR's own `phases_done` (its `mrs[]` entry) â€” the per-MR/PR marker `/flow:feat:ship Â§1` gates on. Suggest `/flow:feat:ship`.
"""
