description = "Split the work into small, independently mergeable MRs/PRs before implementing"

prompt = """
# `/flow:feat:plan`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

**Autonomy.** Read `autonomy.mode` from `FLOW.md` (`manual` | `guided` | `auto`; empty = `manual`) and apply it throughout this command. `manual` — stop at every decision point; at the end, propose the next command by asking the user to confirm it (write the question with the recommended next step as the default numbered option) and invoke it only when the user confirms — never advance without that confirmation, never make the user type it. `guided` — resolve low-risk, unambiguous decisions yourself using the recommended default and record the choice in the phase artifact instead of asking; still ask at genuine decision points; at the end, chain into the recommended next command automatically. `auto` — as `guided`, and also auto-resolve the remaining decision points with sensible (recorded) defaults, chaining phases without pausing. **Hard gates — ALWAYS stop and ask the user, in every mode, no exceptions:** (1) any push or MR/PR creation (all of `ship`); (2) creating or switching a branch when the base is ambiguous (not on a clean main, or a possible train/stacked branch); (3) DB schema changes or migrations; (4) a `review` that surfaced high-severity findings — never chain into `ship` on those. Rule of thumb for everything else: ask only when a decision is (a) irreversible or costly to undo, (b) ambiguous and not resolved by the ticket + domain-memory, or (c) a hard gate; otherwise take the sensible default and record it in the artifact.

Delivery planning phase. **No code is written.** Decide how to split the feature into MRs/PRs that can live on their own on the main branch even if the later ones never arrive.

## 1. Pre-flight

- Load `meta.json` from the current branch. If it does not exist, send the user to `/flow:feat:start`.
- Require `design` in `phases_done`. If not, send to `/flow:feat:design` and stop.
- Read `01-context.md`, `02-brainstorm.md` (if it exists), and `03-design.md`.
- **If `size` is `XS` or `S`**: warn that this phase does not apply (always 1 MR/PR), mark `plan` as skipped in `phases_done` with value `"plan:skipped"`, and suggest `/flow:feat:build`. Stop.

## 2. Work

Load the project convention skills (see `FLOW.md` section `conventions`).

**Before splitting, apply a YAGNI filter to the design**: the plan only divides work that `03-design.md` has already validated as necessary. If while splitting you see an MR/PR (or part of one) dedicated to a **future hypothetical problem** or defending against a scenario that **cannot occur in this project**, do not turn it into a deliverable: mark it as "out of scope — idea for a separate ticket" and notify the user. Do not split or plan what will not be built today. If this reveals that the design let excess pieces through, go back to `/flow:feat:design` to trim them before planning.

Work with an agent (or yourself) with this assignment (self-contained):

> Read `.claude/work/<TICKET>/03-design.md`. Propose how to split the implementation into **independently mergeable** MRs/PRs: each one must be able to live on its own on the main branch without breaking anything even if the later ones never arrive. Think about feature flags, temporary dead code, schema backward compatibility, online migrations in multiple steps, stable event contracts. **Do not create MRs/PRs dedicated to future hypothetical problems or defenses against scenarios the project already prevents — split only what is needed for what the ticket asks today (YAGNI).**
>
> Then build the **dependency graph** (which MR/PR needs another one merged or deployed before it can start) and **sort it topologically into execution waves**: wave 1 = everything with no unmet dependency (can start immediately, in parallel); wave 2 = everything unblocked once wave 1 is in; and so on. **Number the MRs/PRs following that wave order** — the lowest numbers to wave 1, then wave 2, etc. — so that **every MR/PR's dependencies have a strictly lower number than itself** (`#1` is always a valid starting point, never "start at #5"). Within a wave (parallel, no dependency between them) the order is free; number them consecutively. **The number is the execution order, not a grouping by feature area.**
>
> Return a table with: **`n`** (final number = execution order), **`wave`**, **`depends_on`** (list of the `n` it needs merged first; empty if it can start immediately), what it includes, standalone-mergeable (yes/no + how it is guaranteed), what it unblocks in the next one, risk if it stays alone on the main branch indefinitely, **`lines_est`** (approximate lines, sum of added + modified) and **`files_est`** (approximate files touched). Estimates are **soft** — they serve as a gauge during build, not a contract. If the right answer is "1 single MR/PR", justify it and return that. Under 600 words.

If the feature touches payments, authentication, or sensitive data, also launch **in parallel** (or sequentially) the `agents.security` agent from `FLOW.md` (or generic agent if empty) with the assignment: "For each MR/PR proposed in the delivery plan, identify whether it opens a security exposure window while the later ones are not yet merged (e.g. new endpoint without the final check, column without the final constraint). Actionable items only."

## 3. Output

Consolidate in `.claude/work/<TICKET>/04-mr-plan.md`:

```markdown
# Delivery plan <TICKET>

## Summary
- Number of MRs/PRs: N
- Split justification (1-2 lines):

## Execution order (waves)
The number of each MR/PR **is** its execution order: a lower number never depends on a higher one, so `#1` is always a valid starting point.
- **Wave 1** (start now, in parallel): #1, #2
- **Wave 2** (after #1 is merged/deployed): #3, #4
- **Wave 3** (after #3): #5

MRs/PRs in the same wave with no dependency between them can be built in parallel (or as a train). There is no "start at #5" — if something can start first, it is numbered first.

## MRs/PRs

### #1: <short title>
- **Wave**: N — **depends on**: #a, #b (or "nothing — can start immediately").
- **Includes**: bullets of what changes.
- **Standalone-mergeable**: yes / no — how it is guaranteed (flag, nullable column, dead code, etc.).
- **Unblocks**: what the next one can then do.
- **Risk if left alone on the main branch indefinitely**: …
- **Estimated size**: XS / S / M.
- **`lines_est`**: ~N lines (added + modified).
- **`files_est`**: ~N files.

### #2: …

## Dependencies between MRs/PRs
<simple graph in bullets: #3 depends on migration from #1, etc. This graph is what produced the waves and the numbering above — keep them consistent.>

## Plan risks
- Online migrations:
- Compatibility with deployed clients:
- New domain events:
- Feature flags introduced (and when they are removed):

## Decision: one or multiple MRs/PRs?
<if 1: justification. If multiple: why this split and not another>
```

If the plan proposes 1 single MR/PR, keep the artifact the same with that single entry and the justification. Do not force artificial splitting.

## 4. Registration in `meta.json`

Add the `mrs` array to `meta.json` with the agreed plan:

```json
"mrs": [
  { "n": 1, "title": "…", "size": "S", "status": "pending", "phases_done": [], "wave": 1, "depends_on": [], "lines_est": 120, "files_est": 6 },
  { "n": 2, "title": "…", "size": "M", "status": "pending", "phases_done": [], "wave": 2, "depends_on": [1], "lines_est": 350, "files_est": 14 }
]
```

`n` follows the execution order (topological): `depends_on` only ever references a **lower** `n`, and `wave` groups MRs/PRs that can run in parallel. `/flow:feat:build §1` reads `depends_on` to pick the next **startable** MR/PR and to tell the user which ones can go in parallel; keep both fields accurate whenever the plan is edited or renumbered.

Each entry starts with an empty **`phases_done`**: it tracks the phases (`build`/`review`/`validate`) completed **for that MR/PR specifically**, so the gates in `/flow:feat:review §1`, `/flow:feat:validate §1` and `/flow:feat:ship §1` judge *this* MR/PR — a sibling's review never satisfies a new MR/PR's gate. Leave it `[]` for every seeded entry.

Estimates are **indicative**, not contractual. `/flow:feat:build` uses them as a gauge: if actual work exceeds +50% of `lines_est` or `files_est + 2`, it triggers the "cut or continue" question (see build §C).

Valid states:

| State | Meaning |
|-------|---------|
| `pending` | Not yet started. |
| `in_progress` | Build/review/validate of this MR/PR is under way. |
| `merged` | MR/PR merged to the main branch. |
| `closed` | MR/PR closed without merge (rejected, discarded). Requires `note` with reason. |
| `superseded` | Replaced by a later MR/PR (plan was rethought). Requires `note` pointing to the replacement. |

`/flow:feat:build` moves `pending` → `in_progress`. `/flow:feat:ship` moves `in_progress` → `merged` when it confirms the merge, or to `closed` if discarded. If after a build the split needs to be rethought, go back to `/flow:feat:plan`, mark the old entry as `superseded`, and add the new ones.

### Cross-repo entries

If a slice of the plan lands in **another repo**, it is not one of *this* repo's `mrs` — record it in `meta.json.related_repos` (`{ "repo", "scope", "status": "pending" }`) instead, so `/flow:feat:ship` reminds you to open the work there. Keep `mrs` to the MRs/PRs of this repo.

## 5. Is the size still correct?

If while splitting you see that it actually produces 1 small MR/PR (≤ 50 lines, no migrations), reclassify to `S` and notify. If conversely it produces 5+ large MRs/PRs, consider raising to `L`. Confirm with the user (direct text question) before changing `meta.json.size`.

## 6. Close

- Update `meta.json`: `phase = "plan"`, add `plan` to `phases_done`.
- Show the user the summary table and ask for approval.
- If they request changes, edit the artifact and `meta.json.mrs` before proceeding.
- Suggest `/flow:feat:build` to start the first MR/PR.
"""
