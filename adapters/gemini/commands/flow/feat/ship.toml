description = "Commit, push, MR/PR and optional offer to save domain knowledge"

prompt = """
# `/flow:feat:ship`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

**Autonomy.** Read `autonomy.mode` from `FLOW.md` (`manual` | `guided` | `auto`; empty = `manual`) and apply it throughout this command. `manual` — stop at every decision point; at the end, propose the next command by asking the user to confirm it (write the question with the recommended next step as the default numbered option) and invoke it only when the user confirms — never advance without that confirmation, never make the user type it. `guided` — resolve low-risk, unambiguous decisions yourself using the recommended default and record the choice in the phase artifact instead of asking; still ask at genuine decision points; at the end, chain into the recommended next command automatically. `auto` — as `guided`, and also auto-resolve the remaining decision points with sensible (recorded) defaults, chaining phases without pausing. **Hard gates — ALWAYS stop and ask the user, in every mode, no exceptions:** (1) any push or MR/PR creation (all of `ship`); (2) creating or switching a branch when the base is ambiguous (not on a clean main, or a possible train/stacked branch); (3) DB schema changes or migrations; (4) a `review` that surfaced high-severity findings — never chain into `ship` on those. Rule of thumb for everything else: ask only when a decision is (a) irreversible or costly to undo, (b) ambiguous and not resolved by the ticket + domain-memory, or (c) a hard gate; otherwise take the sensible default and record it in the artifact.

Close the feature: commit, push, MR/PR (assigned per `git.assignee`, squashed per `git.squash`, sections per `git.request_sections`) and optional offer to consolidate knowledge.

## 1. Pre-flight

- Load `meta.json`. Require `review` in `phases_done`; for `size` other than `XS`, also require `validate`. **In a multi-MR/PR work** (`meta.json.mrs` has >1 entry) check the **current `in_progress` MR/PR's** own `phases_done` (its `mrs[]` entry), NOT the work-level list — a previous MR/PR's `review`/`validate` does **not** satisfy this gate. This is the guard that stops a train MR/PR from shipping unreviewed just because an earlier sibling was reviewed; the work-level list accumulates and would otherwise pass every later MR/PR for free.
- If not met, refuse and send the user to the missing step (for a multi-MR/PR work, the missing step is `/flow:feat:review` or `/flow:feat:validate` **for this MR/PR**).
- Check that no blocking TODO or FIXME were added in this branch (`git diff --unified=0 <git.default_base>...HEAD | grep -E '^\\+.*(TODO|FIXME)'`). If any, list them and ask whether to continue.

## 2. Draft title and description (without sending anything yet)

**Important**: in this step **no** push command is invoked and nothing is created. Only draft the MR/PR content to show the user in §3.

### Title

Format: `<TICKET> <what it does for the user, in behavior language> [patch|minor|major]`.

**Good**: `<TICKET> List opens for a tracking by API [minor]`
**Bad**: `<TICKET> Add GET /orders/{id}/items endpoint with cursor pagination [minor]`

If `git.squash` is `true`, the squash leaves the MR/PR title as the final commit message, so the commit message and title match.

**Referencing other MRs/PRs of the plan in the body**: never write `#<n>` (the plan order from `meta.json.mrs`). GitHub/GitLab auto-resolve `#N` to whatever real issue/PR carries that number and append its state (e.g. `#5 (closed)`), linking the wrong thing. Reference an already-created MR/PR by its **URL** (`meta.json.mrs[].url`; the platform renders its title + real id) and a not-yet-created one by its **title** in quotes. This does not apply to the `Closes #<N>` issue-link line, where `<N>` is the real issue id.

### Description

**Build the description from the `MR/PR #N brief` in `05-implementation.md`**, not from the technical design. The brief is already written in business language — that is the right material. If `05-implementation.md` has no brief (old work), draft one now based on what was actually built.

If `git.request_sections` from `FLOW.md` is defined, structure the description with those sections in the indicated order. If empty, use the default template:

```markdown
## What it is for
<2-3 bullets: what problem it solves / what need it covers. Why this MR/PR matters. Business language, NOT technical.>

## What changes for the user / system
<3-5 bullets from the "After this MR/PR..." section of the Brief. What a reviewer without technical context can understand.>

## What it does NOT include
<bullets from the "This MR/PR does NOT include..." section of the Brief. Important so the reviewer knows what to leave out of the review scope.>

## Steps to test it
<from `07-validation.md` (flow reproduction) and `01-context.md` (acceptance criteria). Numbered, actionable: "1. Log in as X, 2. Go to Y, 3. Verify Z".>

## Pre-deploy (ONLY if `git.predeploy_gate` is active and the branch touches the database)
SQL to run **manually on the server BEFORE deploying**, all statements in a single block:
```sql
<DDL/indexes/columns/non-automatic data migrations — all together>
```
⚠️ **Do not deploy until this SQL has been executed in production.**

## MR/PR in multi-delivery plan (only if applicable)
<if `meta.json.mrs` has >1 entry: state which one this is (e.g. "MR/PR 2 of 4 in the delivery plan"), then list already-created previous ones by their **URL** and still-pending ones by their **title** in quotes. **Never use `#<n>`** — see the reference rule above. Example: "MR/PR 2 of 4. Previous: <url-of-first-MR>. Pending: «<title of the third>», «<title of the fourth>» (not opened yet).">

---

<details>
<summary>Technical details for reviewers</summary>

- **Modules/layers touched**: <from `05-implementation.md`>
- **Migrations**: <yes/no, online/offline>
- **New domain events**: <list or "none">
- **New / modified endpoints**: <brief list>
- **Relevant design decisions** (see `03-design.md` for full detail): <2-3 key points from the ADR-light>

</details>
```

Rules:
- **The technical block goes in a collapsed `<details>`** — the reviewer opens it if they want, it does not clutter the main reading.
- **The `## Pre-deploy` section does NOT go in `<details>`**: it is a deployment gate, it must be visible. Only applies if `git.predeploy_gate` is active and the branch touches the DB; otherwise omit it.
- **Do not copy bullets from `03-design.md` literally** into the main body. The design talks about layers, repositories, value objects — the MR/PR talks about behavior the user notices.
- **If the brief description contradicts what you see in the diff**, the diff wins (and warn the user: either the brief was wrong, or the build deviated).

### Collect the pre-deploy SQL (only if `git.predeploy_gate` is active)
Determine whether the branch modifies the database (changes to migrations, mappings/schema, or changes recorded in `03-design.md`/`05-implementation.md`). If `quality.db_diff` is defined in `FLOW.md`, run it to see the pending schema SQL. Collect **all** statements to run manually on the server before deploying and consolidate them into **a single block** — the same one that goes in the `## Pre-deploy` section and in the thread from §4.2. Even if there are multiple modifications, it is **one block / one thread**.

## 3. Show to user and wait for confirmation (REQUIRED)

**This step is never skipped, even when the content seems obvious.** The user needs to see and approve what will be published before anything is created.

Print to the user in this exact format:

```
─── Preview of the <git.request_term> ─────────────────────────────────────
Title: <full title, including [patch|minor|major]>
Assigned to: <git.assignee from FLOW.md; if empty: "unassigned">
Squash on merge: <git.squash from FLOW.md>
Target branch: <git.default_base from FLOW.md>
Pre-deploy (manual SQL): <"yes — N statements, a blocking thread will be opened" / "not applicable">

Description:
<full description rendered exactly as it will appear in the MR/PR>
─────────────────────────────────────────────────────────────────
```

If there is pre-deploy SQL, ask the user to **explicitly confirm that the block is complete and correct** — it is what will gate the deployment and what will be executed in production.

Then ask the user directly in text (header: "Create <git.request_term>"):

- **Create with this content**: user confirms → invoke §4.
- **Edit before creating**: user indicates what to change (title, a section, both); adjust and return to §3 with the new preview.
- **Cancel**: stop without creating anything. `meta.json` is not touched. The user can return to `/flow:feat:ship` later.

Do not push or invoke any creation command until the user has responded "Create with this content".

## 4. Commit, push, and MR/PR creation

### 4.0 Anti-deployment lock (before any push)
Verify, and **block** if anything fails:
```bash
git rev-parse --abbrev-ref HEAD                          # must NOT be master/main
git rev-parse --abbrev-ref --symbolic-full-name @{u} 2>/dev/null   # must NOT be the base branch
```
- If HEAD is the main branch (master/main): stop and warn. Do not push from the main branch.
- If the upstream is `<git.default_base>` (branch created without `--no-track`): **do not push by resolving upstream**. Fix with `git branch --unset-upstream` and use `git push -u origin HEAD`, which sets the upstream to the branch's own remote.
- In train mode (`stacked_on` ≠ null): the MR/PR must point to that parent branch, not the main base.

### 4.1 Create MR/PR
Only here — with the content approved by the user in §3 — run git + the `git.cli` CLI from `FLOW.md` to commit, push, and create the MR/PR. Use the final title and description. If it pushes, it must be `git push -u origin HEAD` (own branch), never to the base branch.

If `git.assignee` is not empty in `FLOW.md`, assign to that user. If `git.squash` is `true`, mark squash-before-merge.

If the CLI is not available, do manual commit and push and create the MR/PR with the `git.cli` CLI from `FLOW.md` — always with the content already confirmed in §3.

### 4.2 Pre-deploy thread (deployment gate)
**Only if `git.predeploy_gate` is active and the branch has pre-deploy SQL** (§2). After creating the MR/PR, open **a single resolvable/blocking thread** with **all** the consolidated SQL, using the host from `git.host`/`git.cli`:
- **GitLab**: `glab api "projects/<repo-url-encoded>/merge_requests/<iid>/discussions" -f body="..."` (creates a resolvable thread).
- **GitHub**: a review conversation requiring resolution before merging ("require conversation resolution" policy).

Thread body: the SQL block under "Pre-deploy: run this SQL on the server BEFORE deploying" + "Resolve this thread only after executing it in production."

This is the gate: with the repo's "all threads resolved before merge" policy, the MR/PR cannot be merged or deployed until the SQL is executed and the thread is **resolved**. **One thread even if there are multiple statements.** Notify the user that it is intentionally left open.

## 5. Domain knowledge (offer)

If `domain_memory.enabled` is `true` in `FLOW.md`:

**Only if there is something non-obvious worth saving** (silence-by-default rule):

1. **Read the staging accumulated during the branch**: call `mcp__domain-memory__read_staging`. This shows what `/flow:feat:design` (and possibly other phases) already staged. That is the main material to consolidate.
2. **Review the artifacts** `03-design.md`, `05-implementation.md`, and `06-review.md` for any "why" findings (domain decisions, legal constraints, integrations, business motivations) that **were not staged at the time**. The "what" (code, paths) is NOT saved — that lives in the repo.
3. **Combine staging + new findings** into a short list. If the list is empty or only contains obvious things derivable from the code, do not insist.
4. If there are 1+ relevant findings, ask the user whether they want to consolidate them. If yes, invoke the `/flow:save-knowledge` flow (which already does `read_staging` internally and orchestrates the saving; you provide context on what to consolidate). If not, do not insist.

If `domain_memory.enabled` is `false` or empty, skip without notifying.

## 6. Close

Update `meta.json` based on the scenario:

**A) The MR/PR was merged successfully** (normal case):
- If there is **no** `mrs` or there was only 1: `phase = "done"`, add `ship` to `phases_done`, update `updated_at`.
- If it is a multi-delivery build: mark the current MR/PR as `merged` (with the final `url`) in `meta.json.mrs`. If `pending` entries remain, leave `phase = "build"` (the cycle repeats for the next one). If all are `merged`/`closed`/`superseded`, `phase = "done"`.

**B) The MR/PR was closed without merge** (rejected, discarded by reviewers):
- Mark the current entry as `closed` with a `note` explaining the reason.
- Ask the user: retry with another MR/PR (go back to `/flow:feat:build` with a different approach), or consider the feature unviable (`/flow:work:abandon`)? Do not decide alone.

**C) The plan changed and this MR/PR is dropped**:
- If you are here because the plan was rethought: mark the entry as `superseded` with a `note` pointing to the new MR/PR.

**Tracker: move to done.** **Only when this ship set `phase = "done"`** (scenario A — single MR/PR merged, or the last of a train; never on an intermediate train MR/PR), and only if `tracker.tool` is not `none`/empty, `tracker.done_cmd` is set, and `meta.json.ticket` is a **real tracker id**. `phase = "done"` already implies the completing MR/PR was confirmed merged, so this fires at genuine completion — not at the archive prompt later in this section (which also runs for works that are done but could equally be shelved). Run `tracker.done_cmd` substituting `{TICKET}` = `meta.json.ticket`. Same contract as `/flow:feat:start §6.5`: **best-effort, idempotent, gated** (in `autonomy.mode: manual` ask once before running; in `guided`/`auto` run automatically); failure or already-done ticket → warn in one line and continue, never block. **On GitHub/GitLab leave `tracker.done_cmd` empty** — the `Closes #N` in the MR/PR body (§2) already auto-closes the issue on merge, so this step is for trackers that do not transition from git (Jira, Linear).

Summary to the user: ticket, MR/PR URL, changed files, added tests. In multi-delivery, also indicate remaining entries per `meta.json.mrs`.

**Cross-repo reminder**: if `meta.json.related_repos` has any entry not `done`, call it out explicitly now — this is the moment the other side is usually forgotten. For each such entry: *"you've shipped the `<this-repo>` part; `<repo>` still needs: `<scope>` → go there and run `/flow:feat:start <TICKET>` (or `/flow:bug:start`)"*. flow does not touch or scan the other repo; it only reminds, and this is not a hard gate.

Ask whether they want to keep the `.claude/work/<TICKET>/` folder or archive it (move to `.claude/work/_archive/`) — only if `phase = "done"`.

If `phase = "done"` and `meta.json.worktree` is not null, the branch's worktree is no longer needed once the MR/PR is merged: offer to remove it (from the main checkout) with `git worktree remove <worktree>` (`--force` only if it still has changes the user confirms discarding). Do not remove it if the MR/PR is not yet merged, or without confirmation.
"""
