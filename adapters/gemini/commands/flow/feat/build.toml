description = "Implement the feature following the approved design and keep a running log"

prompt = """
# `/flow:feat:build`

Read `FLOW.md` at the repo root for this repo's conventions (tracker, git, quality, domain, observability). If it does not exist or a key is empty, use the default value or auto-discover as each step indicates. Regarding `domain_memory`: if it is active but the MCP fails or takes more than 2 s, continue without that context — do not block or notify the user. Also, if `FLOW.md` has a `notes` entry for this command (or an `all` entry), follow it as mandatory additional guidance for this step.

Implementation phase. Code is written here.

## 1. Pre-flight

- Load `meta.json` from the current branch.
- For `size` M/L: require that both `03-design.md` **and** `04-mr-plan.md` exist. If the plan is missing, send to `/flow:feat:plan`. If the design is missing, send to `/flow:feat:design`.
- For `size` XS/S: allow starting without a design but ask the user for a 2-3 line note on what they are going to do and save it as a minimal `03-design.md`. No MR/PR plan (always 1 MR/PR).
- Read all previous artifacts.
- **If `meta.json.mrs` has more than one entry**: identify the first MR/PR with `status: "pending"`. That is the MR/PR for this iteration. If all are `merged`, warn: feature is done, nothing to build. Mark the chosen one as `in_progress` in `meta.json.mrs`.

## 2. Business brief (before typing)

**Before loading skills, creating a checklist, or any edit**, write a brief in **business** (non-technical) language specific to **this specific MR/PR** (the `in_progress` one from `meta.json.mrs`, not the whole feature):

```
MR/PR #N brief: <title>

After this MR/PR:
- The user will be able to <X>.
- The system will <do Y / stop doing Z>.
- <success metric if applicable>.

This MR/PR does NOT include:
- <piece Y that belongs to MR/PR #N+1>.
- <related functionality that was decided not to build>.
- <tempting scope that stays out>.
```

Rules for writing it:
- **Business language**: say "the user will be able to filter campaigns by date", not "create the endpoint `GET /campaigns?from=...`".
- **Specific to the MR/PR**: if the feature has 4 MRs/PRs, the brief covers only what this one contributes — not the full feature.
- **The "does NOT include" is mandatory**: even if it seems redundant with `04-mr-plan.md`, repeating it here fixes the scope. If you do not know what to put, the plan is wrong.
- 3-5 bullets in each list. More is noise.

**Ask the user directly in text** whether the brief reflects what they expect:
- **Yes, go ahead** → start building.
- **No, something is extra or missing** → the user clarifies, you adjust the brief and ask again. **Do not touch code** until the brief is confirmed.

Save the brief at the top of `05-implementation.md` under "## MR/PR #N brief". It serves as the contract for the rest of the build: if the urge arises to do something not in the brief, return to §2.4 before doing it.

## 2.0bis Copy the design contracts (verbatim, do not paraphrase)

**Before typing code**, open `03-design.md` and locate the **"External contracts"** section. For **each contract** declared there (HTTP body, header, route, event, column, metric), **copy it literally** to `05-implementation.md` under a new section:

```markdown
## Contracts to respect (copied verbatim from 03-design.md §"External contracts")

### Contract N: <description>
- **Literal shape**:
  <BLOCK COPIED AS-IS, without rewriting, paraphrasing, or "I think it was">
- **Pattern deviation** (if applicable): <copied from the design>
```

Hard rules:
- **Copy, do not rewrite.** The goal is to anchor your attention: when you later decide between following a repo pattern or the declared contract, the contract lives in the file you are writing, not in another one you are no longer looking at.
- **If the design wrote the contract in prose** (without a literal shape), convert it to literal format here and report it to the user: "contract N was in prose in the design, I have converted it to literal — confirm it is correct". Do not proceed until confirmed.
- **If there is a "Pattern deviation" section**: copy it too. It reminds you when coding that you must not imitate the repo pattern even if your hand drifts that way.
- **If the design says "none"** (no external surfaces), skip this step and record: "## Contracts to respect — none declared in design".

Without this copy, §2.1 is not entered.

## 2.1 Work

Load the project skills (see `FLOW.md` section `conventions`).

**If you are in a multi-MR/PR build**: stay within what the current MR/PR covers according to `04-mr-plan.md`. Any code belonging to a later MR/PR is scope creep; trim it or isolate it behind a feature flag / dead code temporarily as the plan dictates. If it cannot be isolated, pause and go back to `/flow:feat:plan` to cut.

Decide execution mode:

- **Single-thread (XS/S/M)**: implement step by step yourself, using subagents only as point consultants when blocked: the `agents.architecture` agent from `FLOW.MD` for layer questions (or generic agent if empty), and `agents.persistence` for query/mapping questions (or generic agent if empty).
- **Partial delegation (M/L with clear pieces)**: use agents for isolated endpoints, and the `agents.testing` agent from `FLOW.MD` in parallel (or sequentially) to prepare the suite (or generic agent if empty). Pass the full `03-design.md` in the prompt so they do not improvise.

Keep a checklist in `05-implementation.md` with the steps from the design's `Implementation plan`. Mark each step as `[in_progress]` when starting and `[done]` when finished — do not batch.

### 2.2 Checkpoints (local commits with user confirmation)

**Hard rule**: the agent **does not run `git commit` on its own** during `/flow:feat:build`. Commits are **opt-in by the user** — without your explicit confirmation, changes stay in the working tree so you can validate them first (test the UI, run the flow, read the diff).

**After completing each checklist step**, the agent:

1. **Marks the step as `[done]`** in the `05-implementation.md` checklist.
2. **Reports to the user** a step summary (≤ 5 lines):
   ```
   Step N done: <description>
     Files: <short list>
     Diff: +<added> / -<removed> lines
     Suggested validation: <e.g. "run the unit test for Foo" or "open the UI at /section">
   ```
3. **Does not commit**. Waits for you to say what to do. Options:
   - **"Commit now"** or **"OK, continue"** → agent runs `git add <step files> && git commit -m "WIP <TICKET>: <step>" --no-verify` and continues to the next step.
   - **"Wait, I'll validate"** → agent stays quiet. You validate at your own pace. When you come back, you decide to commit or adjust.
   - **"Something needs changing"** → agent adjusts. The step commit stays pending until you give the OK again.
   - **"Continue without committing, we'll group later"** → agent starts the next step without committing. Changes accumulate in the working tree (risk: if there is a hot cut §2.3, there are fewer clean points).

Rules for when committing does happen:
- One commit per step (when done). Do not batch multiple steps into one commit unless you explicitly request it.
- `--no-verify` is allowed **only for WIP commits** (slow hooks will run at the end in `/flow:feat:review` and the final commit of `/flow:feat:ship`).
- These commits are squashed on merge (if `git.squash` is `true`), so they do not need to be clean — they are just cuttable units.
- If a step is left half-done (you are interrupted, change focus) and you request a commit, the message gets a suffix: `WIP <TICKET>: <step> (partial)`.

**Why this model**: two reasons. (1) You validate locally before anything is committed, so you do not end up with a branch full of commits without having seen the changes running. (2) If you decide to commit occasionally, WIP commits still serve as cuttable units for §2.3. If you decide not to commit until the end, you lose that granularity — that is your decision, not the agent's.

### 2.3 Size gauge and hot cut

**After each completed step** (with or without a commit), compare the actual size against the estimate for the current MR/PR in `meta.json.mrs`. Look at committed + staged + unstaged, not just commits:

```bash
# Committed changes over the base branch:
git diff --shortstat <git.default_base>..HEAD     # lines
git diff --name-only <git.default_base>..HEAD | wc -l   # files

# Working tree changes (pending commit):
git diff --shortstat HEAD             # uncommitted lines
git status --short | wc -l            # modified/untracked files
```

Sum both sides to get the total actual size of the current MR/PR.

Warning thresholds:
- **Actual lines > `lines_est * 1.5`**, or
- **Actual files > `files_est + 2`**.

If either is exceeded, **pause** and ask the user directly in text (options, in this order):

1. **Cut here (recommended if the current piece is coherent)**. What has been built so far stays as this MR/PR. What remains from the plan is placed in a new one inserted in `meta.json.mrs` right after. Zero code thrown away.
2. **Continue and record the overrun**. Useful if the cut would be artificial. The deviation is noted in `05-implementation.md` to calibrate `/flow:feat:plan` for future tickets.
3. **Reopen plan**. Go back to `/flow:feat:plan` to rethink the whole split. Only if the overrun indicates the plan is wrong at a deeper level, not just for this MR/PR.

**Hot cut mechanics (option 1)**:

0. **If there are uncommitted changes** in the working tree: warn the user and ask them to decide before cutting. Either commit what is done as a WIP for the corresponding step, or save it aside (`git stash`) so it does not mix with the next MR/PR. Without this, the cut leaves loose changes that belong to one side or the other without knowing which.
1. Identify a cut point: the last WIP commit where the piece is coherent and mergeable (a closed sub-goal: "endpoint and DTO ready", "migration applied", "flow X tests green"). Do not cut in the middle of a change.
2. Edit `meta.json.mrs`:
   - The current MR/PR keeps `n` and `title`, adjusts `lines_est` and `files_est` to the real values, and stays `in_progress`.
   - Insert a new one with the next `n` (renumbering later ones if any), `title` describing what remains, `status: "pending"`, and new `lines_est` and `files_est` (indicative).
3. Edit `04-mr-plan.md`: split the original entry into two, keep the standalone-mergeable justification for both halves.
4. Note in `05-implementation.md` under "Hot cut": date, reason, what stays and what goes to the next one.
5. **Do not rewrite history with `git rebase`**: WIP commits that belong to the next MR/PR stay in the current branch. When it is time to build the next one, we will start from a new branch on the base, and those commits are moved with `git cherry-pick` or equivalent. This is documented and executed in `/flow:feat:ship` or when starting the next `/flow:feat:build`.

**If there was already a cut and you overflow again**: ask the user before cutting again — a second cut on the same MR/PR is a sign the plan is wrong, not that the estimate is a bit low. The right option is probably **3 (reopen plan)**.

### 2.4 Does something outside the brief come up?

If during the build the urge arises to add something **not in the brief from §2** ("while I'm here…", "this test would also cover X…", "this rename would improve Y…"):

**Pause before doing it** and ask the user directly in text:
- **Yes, add it to the brief** — update the brief in `05-implementation.md` and continue. (If the addition is large, consider §2.3: it may trigger an MR/PR cut).
- **No, leave it out** — note it in the "Ideas for separate tickets" section of `05-implementation.md` and continue with the original brief.

The rule: anything unforeseen **always** goes through the user before entering code. That is what filters scope creep that is invisible during code review (because it is already mixed in with the rest).

## 3. Log

Keep `.claude/work/<TICKET>/05-implementation.md` updated as you work (not at the end). Schema:

```markdown
# Implementation <TICKET>

## MR/PR #N brief
<3-5 bullets on what the user will be able to do after this MR/PR, in business language>

**This MR/PR does NOT include**:
- <pieces that stay out>

## Changes per file
- <file> — what changed and why (1 line each)

## Decisions made during implementation
- Decision: …
  - Why: …
  - Discarded alternative: …

## Design deviations
- Design said X → did Y because Z

## Relevant commands executed
- <quality.style_fix from FLOW.md>
- <quality.db_update from FLOW.md>
- …

## Pending
- [ ] …

## Ideas for separate tickets
<things that came up during the build and were decided NOT to include; each with one line: "what" + "why it makes sense as its own ticket">
```

## 4. Quality during implementation

As large pieces are completed:

- Run `quality.style_fix` from `FLOW.md` to fix style; if empty, auto-discover (e.g. from Makefile or npm scripts).
- Run `quality.static_analysis` from `FLOW.md` when there is a stable piece; if empty, auto-discover.
- If you added tests, run them targeted with `quality.test_one` from `FLOW.MD` (replacing `{FILTER}`); if empty, auto-discover.

Do not do the code review here — that is `/flow:feat:review`.

## 4.1 Is the design still valid?

Review the "Design deviations" section of `05-implementation.md`. If **any** of the following apply:

- **2+ significant deviations** (module change, different event contract, different entity, unexpected new repository).
- **1 deviation that invalidates a decision** from the ADR-light in `03-design.md`.
- **A design piece appears that the previous inventory did not detect** and that changes the plan.

**Pause the build and go back to `/flow:feat:design`** to update the document (and, if it affects the split, also to `/flow:feat:plan`). Do not keep implementing against a design that is no longer true — `/flow:feat:review` and `/flow:feat:validate` read `03-design.md` as the source of truth and will make wrong judgments if it lies.

If the deviations are small (renames, local adjustments), that is fine: note them and continue.

## 4.2 Textual contract check (before closing)

If in §2.0bis you copied contracts to `05-implementation.md`, **before marking the build as done** you must confront the code against each cited contract. **This is not a test to run** — it is a deliberate textual comparison you perform as the agent, not delegated to the test runner.

For each contract in "Contracts to respect":

1. Locate in the code the shape construction (the controller array, the event constructor, the column migration, the metrics client call, etc.).
2. Dump the **keys and nesting** that code produces (or the literal it emits, in the case of a header/route).
3. Compare **key by key, character by character** against the literal quote copied in §2.0bis.
4. If anything differs — a key in camelCase vs snake_case, a different nesting level, an extra or missing key, a suffix in singular vs plural — **go back and edit the code** to match. Do not proceed to close with a mismatch.

Note the result in `05-implementation.md` under "## Contract verification":

```markdown
## Contract verification (§4.2)
- Contract N "<description>": code produces <actual shape>, quote declares <declared shape>. ✅ matches / ❌ adjusted in commit X.
```

If there were no copied contracts (design said "none"), skip this step and record: "## Contract verification — N/A (no external contracts)".

## 5. Close

- Update `meta.json`: `phase = "build"`, add to `phases_done`.
- If multi-MR/PR build, leave the current MR/PR as `in_progress` in `meta.json.mrs`; it will move to `merged` when `/flow:feat:ship` confirms the merge.
- Summary to the user in bullets: files touched (high level), pending items, **result of §4.2 (contracts verified)**, and next command: `/flow:feat:review`.
"""
