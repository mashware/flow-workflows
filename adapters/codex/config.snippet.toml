# config.snippet.toml — fragment to merge into ~/.codex/config.toml
#
# Instructions:
#   1. Copy the sections you need into your existing ~/.codex/config.toml.
#   2. Adjust command/args/env to match your real domain-memory install.
#   3. For agents, define the roles you need per the agents/review map in FLOW.md.
#
# WARNING: this file is an example fragment, NOT a complete config.toml.
# Do not use it directly as ~/.codex/config.toml — merge it into yours.

# ──────────────────────────────────────────────────────────────────────────────
# MCP server: domain-memory
# ──────────────────────────────────────────────────────────────────────────────
# Adjust command and args to match how you have domain-memory installed.
# Example with npx (global npm install):
[mcp_servers.domain-memory]
command = "npx"
args = ["-y", "domain-memory-mcp"]
env = {}
startup_timeout_sec = 10

# Alternative with node directly (if you have the repo cloned):
# [mcp_servers.domain-memory]
# command = "node"
# args = ["/path/to/domain-memory/dist/index.js"]
# env = { "DOMAIN_MEMORY_PATH" = "/path/to/your/store.json" }
# startup_timeout_sec = 10


# ──────────────────────────────────────────────────────────────────────────────
# Subagents (agents)
# ──────────────────────────────────────────────────────────────────────────────
# The /feat-* and /bug-* flows delegate work to subagents whose names come
# from the `agents` and `review` map in FLOW.md. Each FLOW.md entry such as
# agents.architecture = "my-architect" is declared here as [agents.my-architect].
#
# This adapter does NOT bundle concrete agents: the names are defined by the
# user in FLOW.md. What follows are format examples.
#
# Format of each section:
#   [agents.<name>]
#   model = "<model>"                 # e.g. "o4-mini", "o3", "codex-mini-latest"
#   model_reasoning_effort = "high"   # "low" | "medium" | "high" (reasoning models only)
#   instructions = """
#     <agent system prompt>
#   """
#
# Commented examples (uncomment and adjust the ones you need):

